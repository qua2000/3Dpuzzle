<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D puzzle</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px 16px;
  }
  .hero {
    text-align: center;
    margin-bottom: 30px;
  }
  .hero h1 {
    font-size: 24px;
    font-weight: 600;
    color: #a8c8e8;
  }

  .puzzle-list {
    width: min(700px, 100%);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .puzzle-card {
    background: #141d2b;
    border: 1px solid #2a3a52;
    border-radius: 12px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    text-decoration: none;
    color: inherit;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
  }
  .puzzle-card:hover {
    background: #1a2740;
    border-color: #3a5070;
  }
  .puzzle-card:active { transform: scale(0.99); }

  .puzzle-thumb {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
    border-radius: 10px;
    background: linear-gradient(135deg, #2a5080, #1a3555);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .puzzle-name {
    flex: 1;
    font-size: 15px;
    color: #d0e0f0;
    font-weight: 500;
  }
  .puzzle-arrow {
    font-size: 18px;
    color: #5a7090;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="hero">
  <h1>3D puzzle</h1>
</div>

<div class="puzzle-list">

  <a class="puzzle-card" href="./cutting/">
    <div class="puzzle-thumb">🔪</div>
    <div class="puzzle-name">Cutting animation</div>
    <div class="puzzle-arrow">›</div>
  </a>

</div>

</body>
</html>
