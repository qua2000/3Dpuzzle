<h1>No.2　円錐台の切断面アニメーション</h1>
<p class="subtitle">上面=大円(半径1)・底面=小円／中心から2/3の位置で垂直に切断 → 矢印方向から見た切断面（正解：選択肢5）</p>

<div id="canvas-container">
  <div class="step-label" id="step-label">① 元の円錐台を確認</div>
  <canvas id="c"></canvas>
</div>

<div class="controls">
  <button id="btn0" class="active" onclick="gotoStep(0)">① 元の形状</button>
  <button id="btn1" onclick="gotoStep(1)">② 平面が降りて切断</button>
  <button id="btn2" onclick="gotoStep(2)">③ 切断面が現れる</button>
  <button id="btn3" onclick="gotoStep(3)">④ 正面から見る</button>
</div>

<div class="info-box">
  <h2 id="info-title">① 元の円錐台（フラスタム）の形状</h2>
  <p id="info-text">平面図は「外側の大円(上面・半径1)・内側の小円(底面、点線)」。立面図は下がすぼまった台形（下が底面で狭く、上が上面で広い）。カメラは立体に対して水平・切断面に対して45度の角度に固定します。</p>

    <div class="legend-item"><div class="legend-dot" style="background:#ffaa44"></div>残る部分の断面</div>
  </div>
</div>

<!-- Three.js r128 CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ════════════════════════════════════════════════════════════
   形状の定義（2026/7/3までの内容から変更なし）
   ・上面（y = H）: 大円、半径 R_TOP = 1
   ・底面（y = 0）: 小円、半径 R_BOT = 0.5
   ・切断平面：上面の円の中心から X方向に 2/3 だけ離れた位置(x = OFFSET)を
     通り、YZ平面に平行な平面で切断する。
   ════════════════════════════════════════════════════════════ */
const R_TOP = 1.0;
const R_BOT = 0.5;
const HEIGHT = 2.0;
const OFFSET = R_TOP * (2 / 3);
const SEG = 96;

/* ─── シーン設定 ─── */
const container = document.getElementById('canvas-container');
const canvas = document.getElementById('c');
const W = () => container.clientWidth;
const H = () => container.clientHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x0d1117);
renderer.localClippingEnabled = true;
renderer.setSize(W(), H());

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, W() / H(), 0.1, 100);

/* ════════════════════════════════════════════════════════════
   【カメラの方針】
   ①の要件：「立体と水平・切断面に対して45度の角度」の位置にカメラを置く。
   → 以前のステップ③④で使っていたカメラ位置(4, 2.2, 5.5)をそのまま採用。
     ①②③の間はこのカメラ位置・向きのまま一切変更しません。
   ④「切断面をカメラの正面に向ける」は、立体を回転させるのではなく、
   “カメラの方”を弧を描くように動かして実現します
   （詳細は setCameraByAngle 関数・gotoStep(3) 内のコメント参照）。
   ════════════════════════════════════════════════════════════ */
const CAMERA_POS = { x: 4, y: 2.2, z: 5.5 };
camera.position.set(CAMERA_POS.x, CAMERA_POS.y, CAMERA_POS.z);
camera.lookAt(0, HEIGHT / 2, 0);

/* ─── ライト ─── */
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dir = new THREE.DirectionalLight(0xffffff, 0.8);
dir.position.set(3, 6, 4);
scene.add(dir);
const back = new THREE.DirectionalLight(0x8899bb, 0.3);
back.position.set(-3, 2, -4);
scene.add(back);

/* ════════════════════════════════════════════════════════════
   円錐台ジオメトリ（底面=小円・上面=大円）
   ════════════════════════════════════════════════════════════ */
const frustumGeo = new THREE.CylinderGeometry(R_TOP, R_BOT, HEIGHT, SEG, 1, false);

const matBody = new THREE.MeshPhongMaterial({
  color: 0x3366aa,
  transparent: true, opacity: 0.82,
  side: THREE.DoubleSide,
  shininess: 60,
});
const matCut = new THREE.MeshBasicMaterial({
  color: 0xffaa44,
  side: THREE.DoubleSide,
});

/* ─── ①で表示する、切る前の一体の円錐台 ─── */
const frustumMesh = new THREE.Mesh(frustumGeo, matBody);
frustumMesh.position.y = HEIGHT / 2;
scene.add(frustumMesh);

/* ════════════════════════════════════════════════════════════
   切断後、残る部分（x <= OFFSET 側＝中心を含む大きい方）
   ════════════════════════════════════════════════════════════ */
const clipPlane = new THREE.Plane(new THREE.Vector3(1, 0, 0), -OFFSET);

/* ─── 取り除かれる側（x > OFFSET 側＝斜線部分・小さい方） ─── */
const removedClipPlane = new THREE.Plane(new THREE.Vector3(-1, 0, 0), OFFSET);

/* ★★★ 修正点 ★★★
   THREE.Plane は「normal.dot(point) + constant >= 0」側だけを表示する。
     clipPlane        : normal=(1,0,0),  constant=-OFFSET → x >= OFFSET 側だけ表示（＝小さい方）
     removedClipPlane : normal=(-1,0,0), constant=OFFSET  → x <= OFFSET 側だけ表示（＝大きい方）
   つまり、変数名の意味と、実際に表示される側が逆になっていた。
   → halfMesh（大きい方＝残る立体）には removedClipPlane（x<=OFFSET側）を、
     removedMesh（小さい方＝消える立体）には clipPlane（x>=OFFSET側）を割り当てる。 */
const halfGeo = new THREE.CylinderGeometry(R_TOP, R_BOT, HEIGHT, SEG, 1, false);
const halfMesh = new THREE.Mesh(halfGeo, new THREE.MeshPhongMaterial({
  color: 0x3366aa,
  transparent: true, opacity: 0.88,
  side: THREE.DoubleSide,
  clippingPlanes: [removedClipPlane],   // ← 修正: clipPlane → removedClipPlane
  shininess: 60,
}));
halfMesh.position.y = HEIGHT / 2;
halfMesh.visible = false;

const removedGeo = new THREE.CylinderGeometry(R_TOP, R_BOT, HEIGHT, SEG, 1, false);
const removedMesh = new THREE.Mesh(removedGeo, new THREE.MeshPhongMaterial({
  color: 0xcc5555,
  transparent: true, opacity: 0.55,
  side: THREE.DoubleSide,
  clippingPlanes: [clipPlane],          // ← 修正: removedClipPlane → clipPlane
  shininess: 40,
}));
removedMesh.position.y = HEIGHT / 2;
removedMesh.visible = false;
scene.add(removedMesh);

/* ════════════════════════════════════════════════════════════
   切断面の形状（オレンジ）：計算方法は変更なし
   ════════════════════════════════════════════════════════════ */
function buildCrossSectionShape() {
  const N = 64;
  let yStart = 0;
  if (OFFSET > R_BOT) {
    yStart = HEIGHT * (OFFSET - R_BOT) / (R_TOP - R_BOT);
  }
  yStart = Math.max(0, Math.min(HEIGHT, yStart));

  const rightPts = [];
  for (let i = 0; i <= N; i++) {
    const y = yStart + (HEIGHT - yStart) * (i / N);
    const r = R_BOT + (R_TOP - R_BOT) * (y / HEIGHT);
    const halfW = Math.sqrt(Math.max(0, r * r - OFFSET * OFFSET));
    rightPts.push(new THREE.Vector2(halfW, y));
  }
  const leftPts = [];
  for (let i = N; i >= 0; i--) {
    const y = yStart + (HEIGHT - yStart) * (i / N);
    const r = R_BOT + (R_TOP - R_BOT) * (y / HEIGHT);
    const halfW = Math.sqrt(Math.max(0, r * r - OFFSET * OFFSET));
    leftPts.push(new THREE.Vector2(-halfW, y));
  }

  const shape = new THREE.Shape();
  shape.moveTo(rightPts[0].x, rightPts[0].y);
  rightPts.forEach(p => shape.lineTo(p.x, p.y));
  leftPts.forEach(p => shape.lineTo(p.x, p.y));
  shape.closePath();
  return { shape, yStart };
}

const { shape: csShape } = buildCrossSectionShape();
const csGeo = new THREE.ShapeGeometry(csShape, 64);
const csMesh = new THREE.Mesh(csGeo, matCut);
csMesh.rotation.y = -Math.PI / 2;
csMesh.position.set(OFFSET, 0, 0);
csMesh.visible = false;

/* ─── 上面・底面の弓形 ─── */
function makeCircleSegment(radius, offsetX, color) {
  if (offsetX >= radius) return null;
  const shape = new THREE.Shape();
  const halfW = Math.sqrt(radius * radius - offsetX * offsetX);
  const a0 = Math.atan2(halfW, offsetX);
  const a1 = Math.atan2(-halfW, offsetX);
  shape.moveTo(offsetX, halfW);
  const N = 64;
  let sweepStart = a0;
  let sweepEnd = a1 - 2 * Math.PI;
  for (let i = 0; i <= N; i++) {
    const a = sweepStart + (sweepEnd - sweepStart) * (i / N);
    shape.lineTo(radius * Math.cos(a), radius * Math.sin(a));
  }
  shape.closePath();
  const geo = new THREE.ShapeGeometry(shape, 64);
  const mat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  return mesh;
}

const topSegment = makeCircleSegment(R_TOP, OFFSET, 0x224488);
if (topSegment) topSegment.position.set(0, HEIGHT + 0.002, 0);

const botSegment = makeCircleSegment(R_BOT, OFFSET, 0x224488);
if (botSegment) botSegment.position.set(0, 0.002, 0);

/* ════════════════════════════════════════════════════════════
   【新規】④で回転させる「残る立体」をまとめるグループ
   halfMesh・csMesh・上下の弓形・ガイド平面をひとまとめにし、
   このグループごと回転させることで「立体を回転させる」を実現する。
   ════════════════════════════════════════════════════════════ */
const remainingGroup = new THREE.Group();
remainingGroup.add(halfMesh);
remainingGroup.add(csMesh);
if (topSegment) remainingGroup.add(topSegment);
if (botSegment) remainingGroup.add(botSegment);
scene.add(remainingGroup);

/* ════════════════════════════════════════════════════════════
   【新規】②で使う、上から降りてくる正方形の切断平面
   ・1辺の長さ = 大円の直径(2×R_TOP)より少し大きく
   ・透明度0（完全に不透明）
   ════════════════════════════════════════════════════════════ */
const CUT_PLANE_SIZE = 2 * R_TOP * 1.2; // 直径2.0より少し大きい2.4
const cutPlaneGeo = new THREE.PlaneGeometry(CUT_PLANE_SIZE, CUT_PLANE_SIZE);
const cutPlaneMat = new THREE.MeshPhongMaterial({
  color: 0x44cc88,
  side: THREE.DoubleSide,
  transparent: false, // 透明度0＝不透明
});
const cutPlaneMesh = new THREE.Mesh(cutPlaneGeo, cutPlaneMat);
cutPlaneMesh.rotation.y = Math.PI / 2; // XX'切断面と同じ向き（YZ平面に平行）
cutPlaneMesh.visible = false;
scene.add(cutPlaneMesh);

// 平面の開始位置(上方)・終了位置(下方)。円錐台の上端(HEIGHT)・下端(0)より
// 平面の半分のサイズぶん余裕を持たせて設定。
const CUT_PLANE_START_Y = HEIGHT + CUT_PLANE_SIZE / 2 + 0.3;
const CUT_PLANE_END_Y = -(CUT_PLANE_SIZE / 2 + 0.3);

/* ════════════════════════════════════════════════════════════
   【新規】②の平面が通過した後、切断位置に薄く残るガイド平面
   （remainingGroupの子にして、④で立体と一緒に回転するようにする）
   ════════════════════════════════════════════════════════════ */
const guidePlaneGeo = new THREE.PlaneGeometry(3.2, HEIGHT + 0.6);
const guidePlaneMat = new THREE.MeshPhongMaterial({
  color: 0x44cc88,
  transparent: true,
  opacity: 0.15,
  side: THREE.DoubleSide,
});
const guidePlaneMesh = new THREE.Mesh(guidePlaneGeo, guidePlaneMat);
guidePlaneMesh.rotation.y = Math.PI / 2;
guidePlaneMesh.position.set(OFFSET - 0.03, HEIGHT / 2, 0); // 切断面と重ならないよう少し奥にずらす
guidePlaneMesh.visible = false;
remainingGroup.add(guidePlaneMesh);

/* ─── 切断前に位置の目安を示すXX'線（赤破線） ─── */
const xxGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(OFFSET, HEIGHT + 0.05, -2.2),
  new THREE.Vector3(OFFSET, HEIGHT + 0.05, 2.2)
]);
const xxLine = new THREE.Line(xxGeo, new THREE.LineDashedMaterial({
  color: 0xff4444, dashSize: 0.15, gapSize: 0.08, linewidth: 2
}));
xxLine.computeLineDistances();
xxLine.visible = false;
scene.add(xxLine);

/* ─── グリッド・軸 ─── */
const grid = new THREE.GridHelper(8, 16, 0x223344, 0x1a2a36);
scene.add(grid);
function makeAxisLine(from, to, color) {
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(...from), new THREE.Vector3(...to)
  ]);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color }));
}
scene.add(makeAxisLine([-3,0,0],[3,0,0], 0x553333));
scene.add(makeAxisLine([0,0,0],[0,4,0], 0x335533));
scene.add(makeAxisLine([0,0,-3],[0,0,3], 0x333355));

/* ════════════════════════════════════════════════════════════
   【変更】④は「立体を回転」ではなく「カメラを動かす」方式に変更
   切断面は世界のX軸方向（+X）を向いているため、カメラをY軸まわりに
   弧を描くように動かし、最終的にX軸上（切断面の真正面）まで
   移動させる。カメラの高さ・原点からの距離は変えない（＝立体の
   周りをぐるっと回り込むイメージ）。
   ════════════════════════════════════════════════════════════ */
const CAMERA_RADIUS = Math.sqrt(CAMERA_POS.x ** 2 + CAMERA_POS.z ** 2);
const CAMERA_START_ANGLE = Math.atan2(CAMERA_POS.z, CAMERA_POS.x); // 現在の角度
const CAMERA_TARGET_ANGLE = 0; // X軸上（切断面の正面）＝角度0

function setCameraByAngle(angle) {
  camera.position.x = CAMERA_RADIUS * Math.cos(angle);
  camera.position.z = CAMERA_RADIUS * Math.sin(angle);
  camera.position.y = CAMERA_POS.y;
  camera.lookAt(0, HEIGHT / 2, 0);
}

/* ─── ステップ文言 ─── */
const stepLabels = [
  '① 元の円錐台を確認',
  '② 平面が降りてきて切断中…',
  '③ 切断面が分かれて現れる',
  '④ 立体はそのまま、カメラが切断面の正面へ回り込む'
];
const infoTitles = [
  '① 元の円錐台（フラスタム）の形状',
  '② 正方形の平面が上から降りてきて切断',
  '③ 小さいほうが横に移動し、切断面が見える',
  '④ カメラが弧を描いて切断面の正面へ移動'
];
const infoTexts = [
  '上面（大円・半径1）が底面（小円）より大きい、逆さまの円錐台です。カメラは立体と水平・切断面に対して45度の角度に配置します（②③の間はこの位置のまま動きません。④で切断面の正面まで動きます）。',
  '不透明な正方形の板（緑）が円錐台の真上から降りてきて、中心から2/3の位置（XX\'）を通り抜けて下へ通過します（4秒）。通過し終えると、切断位置に薄い緑の板が目印として残ります。',
  '切断された小さいほうの立体（赤）が画面に対して横方向へスライドしながら、だんだん透明になって消えていきます（2秒）。消えるにつれて、残る立体側の切断面（オレンジ）がはっきり見えるようになります。',
  '残った立体はその場から動かず、カメラのほうが弧を描くように2秒かけて回り込み、切断面（オレンジ）の真正面で止まります（静止2秒）。これが矢印方向から見た切断面＝選択肢5の形です。'
];

let currentStep = 0;
let animating = false;
let animStartTime = 0;

function setVisible(objects, v) { objects.filter(Boolean).forEach(o => o.visible = v); }

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

function resetAllVisuals() {
  animating = false;
  setVisible([frustumMesh], false);
  setVisible([cutPlaneMesh, xxLine, removedMesh], false);
  setVisible([halfMesh, csMesh, guidePlaneMesh, topSegment, botSegment], false);
  removedMesh.position.x = 0;
  removedMesh.material.opacity = 0.55;
  clipPlane.constant = -OFFSET; // ★修正: 立体の位置リセットに合わせて境界線もリセット
  camera.position.set(CAMERA_POS.x, CAMERA_POS.y, CAMERA_POS.z);
  camera.lookAt(0, HEIGHT / 2, 0);
}

function gotoStep(n) {
  currentStep = n;
  document.querySelectorAll('.controls button').forEach((b, i) => {
    b.classList.toggle('active', i === n);
  });
  document.getElementById('step-label').textContent = stepLabels[n];
  document.getElementById('info-title').textContent = infoTitles[n];
  document.getElementById('info-text').textContent = infoTexts[n];

  resetAllVisuals();

  if (n === 0) {
    frustumMesh.visible = true;
  }

  if (n === 1) {
    frustumMesh.visible = true;
    xxLine.visible = true;
    cutPlaneMesh.visible = true;
    cutPlaneMesh.position.set(OFFSET, CUT_PLANE_START_Y, 0);
    animating = true;
    animStartTime = performance.now();
  }

  if (n === 2) {
    halfMesh.visible = true;
    removedMesh.visible = true;
    guidePlaneMesh.visible = false;
    removedMesh.position.x = 0;
    removedMesh.material.opacity = 0.55;
    csMesh.visible = false;
    if (topSegment) topSegment.visible = false;
    if (botSegment) botSegment.visible = false;
    animating = true;
    animStartTime = performance.now();
  }

  if (n === 3) {
    halfMesh.visible = true;
    csMesh.visible = true;
    guidePlaneMesh.visible = true;
    if (topSegment) topSegment.visible = true;
    if (botSegment) botSegment.visible = true;
    removedMesh.visible = false;
    animating = true;
    animStartTime = performance.now();
  }
}

/* ─── アニメーションループ ─── */
const PLANE_DURATION = 4000;      // ②：平面が降りて通過するまでの時間
const SEPARATE_DURATION = 2000;   // ③：小さい立体が離れるまでの時間
const ROTATE_DURATION = 2000;     // ④：回転にかける時間
const HOLD_DURATION = 2000;
const SLIDE_DISTANCE = 2.0;

function animate(time) {
  requestAnimationFrame(animate);

  if (animating && currentStep === 1) {
    const t = Math.min((time - animStartTime) / PLANE_DURATION, 1);
    const y = CUT_PLANE_START_Y + (CUT_PLANE_END_Y - CUT_PLANE_START_Y) * t;
    cutPlaneMesh.position.y = y;
    if (t >= 1) {
      animating = false;
      cutPlaneMesh.visible = false;
      guidePlaneMesh.visible = true;
    }
  }

  if (animating && currentStep === 2) {
    const t = Math.min((time - animStartTime) / SEPARATE_DURATION, 1);
    const ease = easeOutCubic(t);
    removedMesh.position.x = ease * SLIDE_DISTANCE;
    removedMesh.material.opacity = 0.55 * (1 - ease);
    // ★修正: clippingPlanesは空間上の固定位置なので、立体の移動量ぶん
    //         境界線(clipPlane)も一緒にずらして「切る場所」を追従させる。
    //         これをしないと、動くにつれて切られていない部分まで見えてしまう。
    clipPlane.constant = -(OFFSET + removedMesh.position.x);
    if (t >= 1) {
      animating = false;
      removedMesh.visible = false;
      csMesh.visible = true;
      guidePlaneMesh.visible = true;
      if (topSegment) topSegment.visible = true;
      if (botSegment) botSegment.visible = true;
    }
  }

  if (animating && currentStep === 3) {
    const elapsed = time - animStartTime;
    if (elapsed <= ROTATE_DURATION) {
      const t = easeInOutCubic(Math.min(elapsed / ROTATE_DURATION, 1));
      const angle = CAMERA_START_ANGLE + (CAMERA_TARGET_ANGLE - CAMERA_START_ANGLE) * t;
      setCameraByAngle(angle);
    } else {
      setCameraByAngle(CAMERA_TARGET_ANGLE);
      if (elapsed >= ROTATE_DURATION + HOLD_DURATION) {
        animating = false;
      }
    }
  }

  renderer.render(scene, camera);
}
animate(0);

window.addEventListener('resize', () => {
  renderer.setSize(W(), H());
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
});

gotoStep(0);
</script>
