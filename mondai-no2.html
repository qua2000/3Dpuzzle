<h1>No.2　円錐台の切断面</h1>
<p class="subtitle">出典：Ⅰ種国家公務員試験・空間把握</p>

<div class="card">
  <h2>問題</h2>
  <p>
    図のような物体を、平面図に垂直な平面XX'によって切断して、平面図中の斜線部分を取り去った残りの物体を、
    矢印の方向からみたときの、切断面は次のうちどれか。
  </p>

  <div class="figure-wrap">
    <svg viewBox="0 0 420 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="hatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
          <line x1="0" y1="0" x2="0" y2="7" stroke="#a8c8e8" stroke-width="1.4"/>
        </pattern>
        <clipPath id="outerClip">
          <circle cx="105" cy="90" r="68"/>
        </clipPath>
      </defs>

      <!-- 平面図ラベル -->
      <text x="10" y="24" fill="#8aa0b8" font-size="13">平面図</text>

      <!-- 底面(小円・点線)：半径38＝立面図の下辺(小円/底面)の半幅と一致 -->
      <circle cx="105" cy="90" r="38" fill="none" stroke="#5a7090" stroke-width="1.6" stroke-dasharray="4 3"/>
      <!-- 上面(大円)：半径68＝立面図の上辺(大円/上面)の半幅と一致 -->
      <circle cx="105" cy="90" r="68" fill="none" stroke="#c0d0e0" stroke-width="1.8"/>

      <!-- 斜線部分（XX'より下、大円の弓形） -->
      <g clip-path="url(#outerClip)">
        <path d="M 37 60 A 68 68 0 0 0 173 60 L 173 158 A 68 68 0 0 1 37 158 Z"
              fill="url(#hatch)" opacity="0.9"/>
      </g>

      <!-- XX'線 -->
      <line x1="15" y1="60" x2="205" y2="60" stroke="#e07a7a" stroke-width="1.6"/>
      <text x="2" y="64" fill="#e07a7a" font-size="14">X</text>
      <text x="208" y="64" fill="#e07a7a" font-size="14">X'</text>

      <!-- 補助線：円の幅と台形の幅が一致することを示す縦の点線ガイド -->
      <line x1="37" y1="158" x2="37" y2="206" stroke="#3a4a60" stroke-width="1" stroke-dasharray="2 3"/>
      <line x1="173" y1="158" x2="173" y2="206" stroke="#3a4a60" stroke-width="1" stroke-dasharray="2 3"/>

      <!-- 矢印（見る方向） -->
      <line x1="105" y1="170" x2="105" y2="198" stroke="#8aa0b8" stroke-width="1.6"/>
      <polygon points="105,198 100,189 110,189" fill="#8aa0b8"/>

      <!-- 立面図ラベル -->
      <text x="10" y="214" fill="#8aa0b8" font-size="13">立面図</text>

      <!-- 立面図(台形)：上辺の幅=大円の直径(136)、下辺の幅=小円の直径(76)で一致させる -->
      <path d="M 37 206 L 173 206 L 143 264 L 67 264 Z" fill="none" stroke="#c0d0e0" stroke-width="1.8"/>

      <!-- 右側に立体イメージ（参考） -->
      <text x="250" y="24" fill="#5a6a80" font-size="11">※斜線部分（下側の弓形）を取り除いた</text>
      <text x="250" y="40" fill="#5a6a80" font-size="11">残りの立体を、矢印方向から見た切断面を選ぶ</text>
    </svg>
  </div>
</div>

<div class="card">
  <h2>選択肢</h2>
  <div class="choices">

    <!-- 選択肢1：三角形（V字）に取り除く -->
    <div class="choice">
      <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
        <path d="M 40 10 L 160 10 L 138 210 L 62 210 Z" fill="none" stroke="#c0d0e0" stroke-width="2.4"/>
        <path d="M 40 10 L 160 10 L 100 160 Z" fill="url(#h1)"/>
        <defs>
          <pattern id="h1" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="0" y2="6" stroke="#a8c8e8" stroke-width="1.2"/>
          </pattern>
        </defs>
      </svg>
      <span class="num">選択肢 1</span>
    </div>

    <!-- 選択肢2：フラットな底の四角 -->
    <div class="choice">
      <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
        <path d="M 40 10 L 160 10 L 138 210 L 62 210 Z" fill="none" stroke="#c0d0e0" stroke-width="2.4"/>
        <path d="M 40 10 L 160 10 L 144.6 150 L 55.4 150 Z" fill="url(#h2)"/>
        <defs>
          <pattern id="h2" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="0" y2="6" stroke="#a8c8e8" stroke-width="1.2"/>
          </pattern>
        </defs>
      </svg>
      <span class="num">選択肢 2</span>
    </div>

    <!-- 選択肢3：底が凹んだ曲線 -->
    <div class="choice">
      <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
        <path d="M 40 10 L 160 10 L 138 210 L 62 210 Z" fill="none" stroke="#c0d0e0" stroke-width="2.4"/>
        <path d="M 40 10 L 160 10 L 144.6 150 Q 100 118 55.4 150 Z" fill="url(#h3)"/>
        <defs>
          <pattern id="h3" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="0" y2="6" stroke="#a8c8e8" stroke-width="1.2"/>
          </pattern>
        </defs>
      </svg>
      <span class="num">選択肢 3</span>
    </div>

    <!-- 選択肢4：小さな四角（浮いている） -->
    <div class="choice">
      <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
        <path d="M 40 10 L 160 10 L 138 210 L 62 210 Z" fill="none" stroke="#c0d0e0" stroke-width="2.4"/>
        <path d="M 76 110 L 124 110 L 119 190 L 81 190 Z" fill="url(#h4)"/>
        <defs>
          <pattern id="h4" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="0" y2="6" stroke="#a8c8e8" stroke-width="1.2"/>
          </pattern>
        </defs>
      </svg>
      <span class="num">選択肢 4</span>
    </div>

    <!-- 選択肢5：丸みを帯びたドーム（正解） -->
    <div class="choice correct">
      <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
        <path d="M 40 10 L 160 10 L 138 210 L 62 210 Z" fill="none" stroke="#c0d0e0" stroke-width="2.4"/>
        <path d="M 40 10 L 160 10 Q 150 110 100 150 Q 50 110 40 10 Z" fill="url(#h5)"/>
        <defs>
          <pattern id="h5" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="0" y2="6" stroke="#7ee0b8" stroke-width="1.3"/>
          </pattern>
        </defs>
      </svg>
      <span class="num">選択肢 5（正解）</span>
    </div>

  </div>
</div>

<div class="card">
  <h2>解答</h2>
  <span class="answer-badge">正解：選択肢 5</span>
  <p class="note">なぜこの形になるのかは、実際に立体を切断してみるのが一番わかりやすいため、3Dアニメーションページで解説しています。</p>
</div>
